# YATA Core - Knowledge Graph Engine Library
# Article I: Library-First Principle - Independent, reusable library
# Article II: CLI Interface Mandate - Exposes CLI

[project]
name = "yata-core"
version = "0.5.0"
description = "YATA Core - Knowledge Graph Engine for Code Analysis"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "YATA Team" }]
keywords = ["knowledge-graph", "ast-parser", "code-analysis", "tree-sitter"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: Code Generators",
]
dependencies = [
    # AST Parsing (ADR-003)
    "tree-sitter>=0.24.0",
    # Tree-sitter language parsers (24 languages)
    "tree-sitter-python>=0.24.0",
    "tree-sitter-javascript>=0.24.0",
    "tree-sitter-typescript>=0.23.0",
    "tree-sitter-rust>=0.24.0",
    "tree-sitter-go>=0.25.0",
    "tree-sitter-ruby>=0.23.0",
    "tree-sitter-java>=0.23.0",
    "tree-sitter-c-sharp>=0.23.0",
    "tree-sitter-cpp>=0.23.0",
    "tree-sitter-objc>=3.0.0",
    "tree-sitter-php>=0.24.0",
    "tree-sitter-swift>=0.0.1",
    "tree-sitter-kotlin>=1.1.0",
    "tree-sitter-scala>=0.24.0",
    "tree-sitter-lua>=0.2.0",
    "tree-sitter-haskell>=0.23.0",
    "tree-sitter-elixir>=0.3.0",
    "tree-sitter-julia>=0.23.0",
    "tree-sitter-sql>=0.3.0",
    "tree-sitter-groovy>=0.1.0",
    "tree-sitter-c>=0.24.0",
    "tree-sitter-zig>=1.0.0",
    "tree-sitter-yaml>=0.7.0",
    # Graph Storage (ADR-004)
    "networkx>=3.2.0",
    # Data Validation
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    # Utilities
    "structlog>=24.0.0",
    "tomli>=2.0.0;python_version<'3.11'",
]

[project.urls]
Homepage = "https://github.com/nahisaho/YATA"
Repository = "https://github.com/nahisaho/YATA"
Documentation = "https://github.com/nahisaho/YATA#readme"
Issues = "https://github.com/nahisaho/YATA/issues"

[project.optional-dependencies]
ruby = ["tree-sitter-ruby>=0.23.0"]
java = ["tree-sitter-java>=0.23.0"]
csharp = ["tree-sitter-c-sharp>=0.23.0"]
all-languages = [
    "tree-sitter-ruby>=0.23.0",
    "tree-sitter-java>=0.23.0",
    "tree-sitter-c-sharp>=0.23.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.4.0",
    "mypy>=1.9.0",
]

[project.scripts]
# Article II: CLI Interface Mandate
yata-core = "yata_core.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yata_core"]
