# MAGATAMA Release Workflow
# Triggered on version tags (v*.*.*)
# Flow: verify tests -> build packages -> publish to PyPI -> create GitHub Release.
# PyPI publishing uses an API token stored in the `PYPI_API_TOKEN` repo secret
# (see the publish-pypi job below).

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PYTHON_VERSION: "3.12"

jobs:
  # Verify tests pass before release
  verify:
    name: Verify Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run all tests
        run: uv run pytest --tb=short

      - name: Verify coverage >= 80%
        run: uv run pytest --cov --cov-fail-under=80

  # Build packages
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [verify]
    strategy:
      matrix:
        package: [magatama-core, magatama]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build ${{ matrix.package }}
        run: uv build --package ${{ matrix.package }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: dist/

  # Publish to PyPI using an API token.
  # PREREQUISITE (one-time): add a repository secret `PYPI_API_TOKEN` containing
  # an account-scoped PyPI API token (account scope is required to create the
  # `magatama` / `magatama-core` projects on first publish). After the projects
  # exist, the token can be narrowed to project scope or switched to Trusted
  # Publishing.
  publish-pypi:
    name: Publish ${{ matrix.package }} to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        package: [magatama-core, magatama]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/

  # Create GitHub Release
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MAGATAMA v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
