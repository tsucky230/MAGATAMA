# MAGATAMA Release Workflow
# Triggered on version tags (v*.*.*)
# Builds packages and creates a GitHub Release. (PyPI publishing is disabled for
# this fork — see the publish-pypi job below.)

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PYTHON_VERSION: "3.12"

jobs:
  # Verify tests pass before release
  verify:
    name: Verify Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run all tests
        run: uv run pytest --tb=short

      - name: Verify coverage >= 80%
        run: uv run pytest --cov --cov-fail-under=80

  # Build packages
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [verify]
    strategy:
      matrix:
        package: [magatama-core, magatama-mcp]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build ${{ matrix.package }}
        run: uv build --package ${{ matrix.package }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: dist/

  # Publish to PyPI
  # NOTE: Disabled for the MAGATAMA fork.
  #   - PyPI publishing is intentionally not configured for this fork: there is
  #     no `pypi` GitHub Environment / PyPI Trusted Publisher set up for
  #     tsucky230/MAGATAMA.
  # To enable PyPI publishing: register the `magatama-core` / `magatama-mcp`
  # projects on PyPI, set up Trusted Publishing, create a `pypi` environment,
  # then uncomment this job and restore `needs: [publish-pypi]` on
  # github-release below.
  # publish-pypi:
  #   name: Publish ${{ matrix.package }} to PyPI
  #   runs-on: ubuntu-latest
  #   needs: [build]
  #   strategy:
  #     matrix:
  #       package: [magatama-core, magatama-mcp]
  #   environment: pypi
  #   permissions:
  #     id-token: write
  #   steps:
  #     - name: Download artifacts
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: dist-${{ matrix.package }}
  #         path: dist/
  #
  #     - name: Publish to PyPI
  #       uses: pypa/gh-action-pypi-publish@release/v1
  #       with:
  #         # Uses trusted publishing (OIDC)
  #         # Configure at https://pypi.org/manage/account/publishing/
  #         packages-dir: dist/

  # Create GitHub Release
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MAGATAMA v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
