# MUSUBI Project Configuration
name: MAGATAMA
description: AI Coding Support MCP Server - 知識グラフベースのAIコーディング支援
locale: ja
version: "0.5.0"
created: 2025-12-31
updated: 2026-01-01

# Technology Stack
tech_stack:
  approach: clean-architecture
  languages:
    - python: "3.11+"
  frameworks:
    - mcp: "^1.0.0"
    - fastmcp: "MCP SDK"
    - tree-sitter: "^0.24.0"
    - networkx: "^3.2.0"
    - click: "^8.1.0"
    - pydantic: "^2.5.0"
    - uvicorn: "^0.27.0"
    - httpx: "^0.27.0"
    - rich: "^13.7.0"
    - watchdog: "^4.0.0"
  # comP Bridge: imports comP's .comp/index.db (SQLite) into the knowledge graph
  testing:
    - pytest
    - pytest-cov
    - pytest-asyncio
  linting:
    - ruff
    - mypy

# Project Metrics
metrics:
  tests: 794
  coverage: "76%"
  mcp_tools: 36
  language_parsers: 24
  framework_knowledge_graphs: 47
  design_patterns_detection: 10
  comp_bridge_tools: 2

# Features (Context7 Superior)
features:
  phase1:
    - REQ-001: DocumentationGenerationUseCase
    - REQ-002: CodeRecommendationUseCase
    - REQ-003: DependencyImpactUseCase
  phase2:
    - REQ-004: HybridSearchUseCase
    - REQ-005: CodeQualityUseCase
    - REQ-006: CodeEvolutionUseCase
  phase3:
    - REQ-007: CodingGuidanceUseCase
    - REQ-008: PatternDetectionUseCase
    - REQ-009: APICompatibilityUseCase
    - REQ-010: CodeNavigationUseCase


# Review Gate Settings (v6.2.0)
reviewGate:
  requirements:
    earsCheck: true
    stakeholderCoverage: true
    acceptanceCriteriaRequired: true
  design:
    c4Required: ['context', 'container', 'component']
    adrRequired: true
    constitutionalArticles: [1, 2, 7, 8]
  implementation:
    minCoverage: 80
    coverageType: 'line'
    lintStrict: true

# Traceability Settings (v6.2.0)
traceability:
  patterns:
    - 'REQ-[A-Z0-9]+-\\d{3}'
    - 'IMP-\\d+\\.\\d+-\\d{3}(?:-\\d{2})?'
  extractFrom:
    - 'packages/**/src/**/*.py'
    - 'packages/**/tests/**/*.py'
  outputPath: 'storage/traceability/matrix.yml'
